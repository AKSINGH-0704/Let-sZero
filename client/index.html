    <!-- M33-B — this requested 26 Google Font families. Twenty-two of them were
         never referenced anywhere in client/src or marketing: Architects
         Daughter, DM Sans, Fira Code, Geist, Geist Mono, IBM Plex Mono/Sans,
         Libre Baskerville, Lora, Merriweather, Montserrat, Outfit, Oxanium,
         Playfair Display, Plus Jakarta Sans, Poppins, Roboto, Roboto Mono,
         Source Code Pro, Source Serif 4, Space Mono. It is a render-blocking
         third-party stylesheet, and Lighthouse measured it costing 853ms of
         render delay on a mobile article page.

         Trimmed to the four families actually used, with their original
         variable-font ranges preserved exactly. The duplicate @import of
         Space Grotesk / Inter / JetBrains Mono was removed from index.css at
         the same time: it requested fonts this link already covers, and an
         @import inside a stylesheet is the slowest way to load them because
         the browser cannot discover it until the CSS itself has downloaded. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
